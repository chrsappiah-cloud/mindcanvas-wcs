jobs:
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]


  nodejs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint || true
      - name: Build
        run: npm run build
      - name: Run tests
        run: npm test || true

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Install dependencies
        run: |
          brew install swiftlint || true
      - name: Build MindCanvas
        run: |
          cd mindcanvas
          xcodebuild -scheme MindCanvasApp -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 15' build
      - name: Run tests
        run: |
          cd mindcanvas
          xcodebuild test -scheme MindCanvasApp -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 15' | xcpretty
      - name: Lint Swift code
        run: |
          swiftlint --strict || true
