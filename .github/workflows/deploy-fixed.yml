name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Build and archive for App Store
        run: |
          cd mindcanvas
          xcodebuild -scheme MindCanvasApp -sdk iphoneos -configuration Release -archivePath ${{ github.workspace }}/build/MindCanvasApp.xcarchive archive
      - name: Export IPA
        run: |
          cd mindcanvas
          xcodebuild -exportArchive -archivePath ${{ github.workspace }}/build/MindCanvasApp.xcarchive -exportOptionsPlist ExportOptions.plist -exportPath ${{ github.workspace }}/build
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: MindCanvasApp.ipa
          path: ${{ github.workspace }}/build/MindCanvasApp.ipa
      # - name: Deploy to TestFlight (manual step)
      #   run: echo "Upload to App Store Connect with fastlane or altool"

  deploy-nodejs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: '--prod'
