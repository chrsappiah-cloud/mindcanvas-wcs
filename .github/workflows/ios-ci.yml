name: iOS CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest
    - name: Build with xcodebuild
      run: |
        xcodebuild -scheme "mindcanvas" -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' build
    - name: Run tests with xcodebuild
      run: |
        xcodebuild test -scheme "mindcanvas" -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest'
